services:
  - type: web
    name: youtube-mcp-server
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRANSPORT_TYPE
        value: sse
      - key: PORT
        value: 3000
    healthCheckPath: /health
    autoDeploy: true
